<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Memória Amiga</title>
    <link rel="shortcut icon" href="../assets/favicon.ico" type="image/x-icon">
  </head>
  
  <body>
    
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  #memory-game-root {
    min-height: 100vh;
    background: #0f0e1a;
    background-image: radial-gradient(ellipse at 20% 20%, rgba(99,51,204,0.15) 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 80%, rgba(0,212,255,0.1) 0%, transparent 50%);
    font-family: 'Rajdhani', sans-serif;
    color: #e2e8f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
    position: relative;
    overflow-x: hidden;
  }

  .game-header {
    width: 100%;
    max-width: 480px;
    text-align: center;
    margin-bottom: 20px;
  }

  .game-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(18px, 5vw, 26px);
    font-weight: 900;
    letter-spacing: 3px;
    background: linear-gradient(135deg, #00d4ff, #a855f7, #ff2d78);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(168,85,247,0.5));
  }

  .game-subtitle {
    font-size: 12px;
    letter-spacing: 4px;
    color: rgba(148,163,184,0.7);
    text-transform: uppercase;
  }

  .stats-bar {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 20px;
    justify-content: center;
  }

  .stat-card {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(168,85,247,0.25);
    border-radius: 16px;
    padding: 10px 8px;
    text-align: center;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(10px);
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(168,85,247,0.6), transparent);
  }

  .stat-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(148,163,184,0.6);
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .stat-value {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 700;
    color: #a855f7;
    text-shadow: 0 0 10px rgba(168,85,247,0.8);
  }

  .stat-value.cyan { color: #00d4ff; text-shadow: 0 0 10px rgba(0,212,255,0.8); }
  .stat-value.pink { color: #ff2d78; text-shadow: 0 0 10px rgba(255,45,120,0.8); }

  .xp-bar-container {
    width: 100%;
    max-width: 480px;
    margin-bottom: 20px;
  }

  .xp-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: rgba(148,163,184,0.6);
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  .xp-bar-track {
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    overflow: hidden;
  }

  .xp-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #a855f7, #00d4ff);
    border-radius: 99px;
    transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 0 8px rgba(168,85,247,0.8);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    width: 100%;
    max-width: 480px;
  }

  .card-wrap {
    aspect-ratio: 1;
    perspective: 800px;
    cursor: pointer;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.34,1.1,0.64,1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  .card-back {
    background: linear-gradient(135deg, #1a1635, #0f172a);
    border: 1px solid rgba(168,85,247,0.3);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .card-back-pattern {
    width: 60%;
    height: 60%;
    background: linear-gradient(135deg, rgba(168,85,247,0.15), rgba(0,212,255,0.1));
    border-radius: 8px;
    border: 1px solid rgba(168,85,247,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-back-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(168,85,247,0.4);
    box-shadow: 0 0 8px rgba(168,85,247,0.6);
  }

  .card-front {
    transform: rotateY(180deg);
    border: 1px solid transparent;
    font-size: clamp(22px, 7vw, 32px);
  }

  .card-front.matched {
    animation: matchPulse 0.6s ease forwards;
  }

  @keyframes matchPulse {
    0% { transform: rotateY(180deg) scale(1); }
    40% { transform: rotateY(180deg) scale(1.12); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  .card-wrap:hover:not(.disabled) .card-back {
    border-color: rgba(168,85,247,0.6);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 15px rgba(168,85,247,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
    transform: translateY(-2px);
  }

  .card-wrap:active:not(.disabled) .card-inner:not(.flipped) { transform: scale(0.95); }

  .card-wrap.disabled { cursor: default; }

  .btn-row {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 480px;
    margin-top: 24px;
  }

  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .btn-primary {
    background: linear-gradient(135deg, rgba(168,85,247,0.15), rgba(0,212,255,0.1));
    border-color: rgba(168,85,247,0.5);
    color: #a855f7;
  }

  .btn-primary:hover {
    background: linear-gradient(135deg, rgba(168,85,247,0.25), rgba(0,212,255,0.18));
    border-color: rgba(168,85,247,0.9);
    box-shadow: 0 0 20px rgba(168,85,247,0.3);
    transform: translateY(-1px);
  }

  .btn-secondary {
    background: rgba(255,255,255,0.03);
    border-color: rgba(148,163,184,0.2);
    color: rgba(148,163,184,0.7);
  }

  .btn-secondary:hover {
    border-color: rgba(148,163,184,0.4);
    color: #e2e8f0;
  }

  .victory-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,14,26,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .victory-overlay.show { display: flex; }

  .victory-card {
    background: linear-gradient(135deg, #1a1635, #0f172a);
    border: 1px solid rgba(168,85,247,0.4);
    border-radius: 24px;
    padding: 40px 32px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(168,85,247,0.2), 0 0 120px rgba(0,212,255,0.1);
    animation: victoryEntrance 0.5s cubic-bezier(0.34,1.4,0.64,1) forwards;
  }

  @keyframes victoryEntrance {
    from { opacity: 0; transform: scale(0.7) translateY(40px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .victory-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #a855f7, #00d4ff, #ff2d78, transparent);
    animation: scanLine 2s linear infinite;
  }

  @keyframes scanLine {
    0% { opacity: 0.5; }
    50% { opacity: 1; }
    100% { opacity: 0.5; }
  }

  .victory-emoji {
    font-size: 64px;
    margin-bottom: 16px;
    filter: drop-shadow(0 0 20px rgba(168,85,247,0.8));
    animation: floatEmoji 2s ease-in-out infinite;
  }

  @keyframes floatEmoji {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-8px) scale(1.05); }
  }

  .victory-title {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    background: linear-gradient(135deg, #00d4ff, #a855f7, #ff2d78);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .victory-sub {
    font-size: 14px;
    color: rgba(148,163,184,0.7);
    letter-spacing: 1px;
    margin-bottom: 28px;
  }

  .victory-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }

  .v-stat {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(168,85,247,0.2);
    border-radius: 12px;
    padding: 12px 6px;
  }

  .v-stat-val {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 700;
    color: #a855f7;
    text-shadow: 0 0 8px rgba(168,85,247,0.8);
    margin-bottom: 2px;
  }

  .v-stat-lbl {
    font-size: 9px;
    letter-spacing: 1.5px;
    color: rgba(148,163,184,0.5);
    text-transform: uppercase;
  }

  .xp-gain {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 900;
    color: #00d4ff;
    text-shadow: 0 0 20px rgba(0,212,255,0.9);
    margin-bottom: 6px;
  }

  .xp-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(0,212,255,0.7);
    margin-bottom: 24px;
    text-transform: uppercase;
  }

  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 99;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    animation: particleFall linear forwards;
  }

  @keyframes particleFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(60vh) rotate(720deg) scale(0.2); }
  }

  .difficulty-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    width: 100%;
    max-width: 480px;
  }

  .diff-btn {
    flex: 1;
    padding: 8px;
    border-radius: 10px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid rgba(148,163,184,0.2);
    background: rgba(255,255,255,0.02);
    color: rgba(148,163,184,0.5);
    transition: all 0.2s;
  }

  .diff-btn.active-easy { border-color: rgba(0,212,255,0.6); color: #00d4ff; background: rgba(0,212,255,0.08); }
  .diff-btn.active-medium { border-color: rgba(168,85,247,0.6); color: #a855f7; background: rgba(168,85,247,0.08); }
  .diff-btn.active-hard { border-color: rgba(255,45,120,0.6); color: #ff2d78; background: rgba(255,45,120,0.08); }

  .timer-ring {
    width: 38px;
    height: 38px;
    position: relative;
  }

  .timer-ring svg { transform: rotate(-90deg); }

  .timer-ring-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    color: #ff2d78;
  }
</style>

<div id="memory-game-root">
  <div class="game-header">
    <div class="game-title">MEMÓRIA</div>
    <div class="game-subtitle">Neural Match · Dark Edition</div>
  </div>

  <div class="difficulty-selector">
    <button class="diff-btn active-easy" onclick="setDifficulty('easy')">Fácil</button>
    <button class="diff-btn" onclick="setDifficulty('medium')">Médio</button>
    <button class="diff-btn" onclick="setDifficulty('hard')">Difícil</button>
  </div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Movimentos</div>
      <div class="stat-value" id="moves-val">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pares</div>
      <div class="stat-value cyan" id="pairs-val">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Tempo</div>
      <div class="stat-value pink" id="time-val">00:00</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">XP Total</div>
      <div class="stat-value" id="xp-total-val">0</div>
    </div>
  </div>

  <div class="xp-bar-container">
    <div class="xp-bar-label">
      <span>XP desta partida</span>
      <span id="xp-text">0 / 100</span>
    </div>
    <div class="xp-bar-track">
      <div class="xp-bar-fill" id="xp-bar" style="width:0%"></div>
    </div>
  </div>

  <div class="grid" id="card-grid"></div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="restartGame()">🔄 Jogar Novamente</button>
    <button class="btn btn-secondary" onclick="showInfo()">ℹ️ Info</button>
  </div>
</div>

<div class="victory-overlay" id="victory-overlay">
  <div class="particles" id="particles"></div>
  <div class="victory-card">
    <div class="victory-emoji">🏆</div>
    <div class="victory-title">VOCÊ VENCEU!</div>
    <div class="victory-sub">Todos os pares encontrados</div>
    <div class="victory-stats">
      <div class="v-stat">
        <div class="v-stat-val" id="v-moves">0</div>
        <div class="v-stat-lbl">Movimentos</div>
      </div>
      <div class="v-stat">
        <div class="v-stat-val" id="v-time">0:00</div>
        <div class="v-stat-lbl">Tempo</div>
      </div>
      <div class="v-stat">
        <div class="v-stat-val" id="v-accuracy">0%</div>
        <div class="v-stat-lbl">Precisão</div>
      </div>
    </div>
    <div class="xp-gain" id="v-xp">+0 XP</div>
    <div class="xp-label">Experiência Ganha</div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-primary" style="font-size:12px;" onclick="closeVictory();restartGame()">🔄 Jogar Novamente</button>
      <button class="btn btn-secondary" style="font-size:12px;" onclick="closeVictory()">✓ Fechar</button>
    </div>
  </div>
</div>

<script>
const DIFFICULTIES = {
  easy:   { cols: 4, pairs: 8,  xpBase: 50,  timeBonus: 180 },
  medium: { cols: 4, pairs: 10, xpBase: 100, timeBonus: 120 },
  hard:   { cols: 5, pairs: 12, xpBase: 200, timeBonus: 90  }
};

const CARD_DATA = [
  { id: 'a', emoji: '🔮', color: '#a855f7', glow: '168,85,247' },
  { id: 'b', emoji: '⚡', color: '#fbbf24', glow: '251,191,36' },
  { id: 'c', emoji: '🌊', color: '#00d4ff', glow: '0,212,255' },
  { id: 'd', emoji: '🔥', color: '#ff2d78', glow: '255,45,120' },
  { id: 'e', emoji: '🍀', color: '#34d399', glow: '52,211,153' },
  { id: 'f', emoji: '🌙', color: '#c084fc', glow: '192,132,252' },
  { id: 'g', emoji: '⭐', color: '#fde047', glow: '253,224,71' },
  { id: 'h', emoji: '💎', color: '#38bdf8', glow: '56,189,248' },
  { id: 'i', emoji: '🦋', color: '#f472b6', glow: '244,114,182' },
  { id: 'j', emoji: '🐉', color: '#fb923c', glow: '251,146,60' },
  { id: 'k', emoji: '🌺', color: '#e879f9', glow: '232,121,249' },
  { id: 'l', emoji: '🚀', color: '#22d3ee', glow: '34,211,238' }
];

let state = {
  difficulty: 'easy',
  cards: [],
  flipped: [],
  matched: [],
  moves: 0,
  xp: 0,
  totalXp: parseInt(localStorage.getItem('memoryXP') || '0'),
  seconds: 0,
  timerInterval: null,
  locked: false,
  gameStarted: false
};

function setDifficulty(d) {
  state.difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => {
    b.className = 'diff-btn';
    if (b.textContent.toLowerCase().includes(d === 'easy' ? 'fác' : d === 'medium' ? 'méd' : 'dif')) {
      b.classList.add('active-' + d);
    }
  });
  restartGame();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildCards() {
  const cfg = DIFFICULTIES[state.difficulty];
  const data = shuffle([...CARD_DATA]).slice(0, cfg.pairs);
  return shuffle([...data, ...data].map((d, i) => ({
    ...d,
    uid: i + '-' + d.id,
    flipped: false,
    matched: false
  })));
}

function startTimer() {
  clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    state.seconds++;
    const m = String(Math.floor(state.seconds / 60)).padStart(2, '0');
    const s = String(state.seconds % 60).padStart(2, '0');
    document.getElementById('time-val').textContent = m + ':' + s;
  }, 1000);
}

function updateXP(gained) {
  state.xp = Math.min(100, state.xp + gained);
  document.getElementById('xp-bar').style.width = state.xp + '%';
  document.getElementById('xp-text').textContent = state.xp + ' / 100';
}

function updateStats() {
  document.getElementById('moves-val').textContent = state.moves;
  document.getElementById('pairs-val').textContent = state.matched.length / 2;
  document.getElementById('xp-total-val').textContent = state.totalXp;
}

function renderGrid() {
  const grid = document.getElementById('card-grid');
  const cfg = DIFFICULTIES[state.difficulty];
  grid.style.gridTemplateColumns = `repeat(${cfg.cols}, 1fr)`;
  grid.innerHTML = '';

  state.cards.forEach((card, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap';
    wrap.dataset.idx = i;
    wrap.innerHTML = `
      <div class="card-inner" id="ci-${i}">
        <div class="card-face card-back">
          <div class="card-back-pattern"><div class="card-back-dot"></div></div>
        </div>
        <div class="card-face card-front" id="cf-${i}" style="background:linear-gradient(135deg,rgba(${card.glow},0.12),rgba(${card.glow},0.06));border-color:rgba(${card.glow},0.5);box-shadow:0 0 16px rgba(${card.glow},0.15);">
          <span style="filter:drop-shadow(0 0 8px rgba(${card.glow},0.9));">${card.emoji}</span>
        </div>
      </div>`;
    wrap.addEventListener('click', () => flipCard(i));
    grid.appendChild(wrap);
  });
}

function flipCard(i) {
  if (state.locked) return;
  if (state.matched.includes(i)) return;
  if (state.flipped.includes(i)) return;
  if (state.flipped.length >= 2) return;

  if (!state.gameStarted) { state.gameStarted = true; startTimer(); }

  state.flipped.push(i);
  document.getElementById('ci-' + i).classList.add('flipped');

  if (state.flipped.length === 2) {
    state.moves++;
    updateStats();
    checkMatch();
  }
}

function checkMatch() {
  const [a, b] = state.flipped;
  const ca = state.cards[a], cb = state.cards[b];
  state.locked = true;

  if (ca.id === cb.id) {
    setTimeout(() => {
      state.matched.push(a, b);
      const gained = state.difficulty === 'hard' ? 15 : state.difficulty === 'medium' ? 12 : 10;
      state.xp = Math.min(100, state.xp + gained);
      state.totalXp += gained;
      localStorage.setItem('memoryXP', state.totalXp);

      document.getElementById('cf-' + a).classList.add('matched');
      document.getElementById('cf-' + b).classList.add('matched');
      document.getElementById('ci-' + a).style.filter = `drop-shadow(0 0 12px rgba(${ca.glow},0.9))`;
      document.getElementById('ci-' + b).style.filter = `drop-shadow(0 0 12px rgba(${cb.glow},0.9))`;

      updateXP(0);
      document.getElementById('xp-bar').style.width = state.xp + '%';
      document.getElementById('xp-text').textContent = state.xp + ' / 100';
      document.getElementById('pairs-val').textContent = state.matched.length / 2;
      document.getElementById('xp-total-val').textContent = state.totalXp;

      state.flipped = [];
      state.locked = false;

      if (state.matched.length === state.cards.length) {
        setTimeout(showVictory, 400);
      }
    }, 200);
  } else {
    setTimeout(() => {
      document.getElementById('ci-' + a).classList.remove('flipped');
      document.getElementById('ci-' + b).classList.remove('flipped');
      state.flipped = [];
      state.locked = false;
    }, 900);
  }
}

function showVictory() {
  clearInterval(state.timerInterval);

  const cfg = DIFFICULTIES[state.difficulty];
  const timeBonus = Math.max(0, cfg.timeBonus - state.seconds);
  const accuracy = Math.round((state.matched.length / 2 / state.moves) * 100);
  const totalXpGained = state.xp + timeBonus;

  state.totalXp += timeBonus;
  localStorage.setItem('memoryXP', state.totalXp);

  const m = String(Math.floor(state.seconds / 60)).padStart(2, '0');
  const s = String(state.seconds % 60).padStart(2, '0');
  
  document.getElementById('v-moves').textContent = state.moves;
  document.getElementById('v-time').textContent = m + ':' + s;
  document.getElementById('v-accuracy').textContent = Math.min(100, accuracy) + '%';
  document.getElementById('v-xp').textContent = '+' + totalXpGained + ' XP';

  spawnParticles();
  document.getElementById('victory-overlay').classList.add('show');
}

function spawnParticles() {
  const container = document.getElementById('particles');
  container.innerHTML = '';
  const colors = ['#a855f7','#00d4ff','#ff2d78','#fbbf24','#34d399'];
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    const size = 4 + Math.random() * 8;
    p.className = 'particle';
    p.style.cssText = `
      left:${Math.random()*100}%;
      top:${-10 - Math.random()*20}%;
      width:${size}px;height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${1.5 + Math.random()*2}s;
      animation-delay:${Math.random()*0.8}s;
      box-shadow:0 0 6px currentColor;
    `;
    container.appendChild(p);
  }
}

function closeVictory() {
  document.getElementById('victory-overlay').classList.remove('show');
}

function restartGame() {
  clearInterval(state.timerInterval);
  const totalXp = state.totalXp;
  state = {
    difficulty: state.difficulty,
    cards: buildCards(),
    flipped: [], matched: [],
    moves: 0, xp: 0,
    totalXp, seconds: 0,
    timerInterval: null,
    locked: false,
    gameStarted: false
  };
  document.getElementById('moves-val').textContent = '0';
  document.getElementById('pairs-val').textContent = '0';
  document.getElementById('time-val').textContent = '00:00';
  document.getElementById('xp-total-val').textContent = totalXp;
  document.getElementById('xp-bar').style.width = '0%';
  document.getElementById('xp-text').textContent = '0 / 100';
  renderGrid();
}

function showInfo() {
  alert('🎮 Jogo da Memória - Dark Neon\n\n• Encontre todos os pares\n• Fácil: 8 pares\n• Médio: 10 pares\n• Difícil: 12 pares\n\nXP acumula entre partidas!');
}

restartGame();

function spawnParticles() {
  const container = document.getElementById('particles');
  container.innerHTML = '';

  const colors = ['#a855f7', '#00d4ff', '#ff2d78'];

  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';

    p.style.left = Math.random() * 100 + '%';
    p.style.top = '-10px';
    p.style.width = p.style.height = (4 + Math.random() * 6) + 'px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDuration = (1 + Math.random() * 2) + 's';

    container.appendChild(p);
  }
}
