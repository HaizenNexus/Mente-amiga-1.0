<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jogo das Cores</title>
  <link rel="shortcut icon" href="../assets/favicon.ico" type="image/x-icon">
  
  <link rel="stylesheet" href="../css/games.css">
  
  
  
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- ═══════════════════════════════════════════
       TELA INICIAL
  ════════════════════════════════════════════ -->
  <div id="screen-intro" class="screen active">
    <div class="intro-bg-orbs">
      <span class="orb orb-1"></span>
      <span class="orb orb-2"></span>
      <span class="orb orb-3"></span>
    </div>
    <div class="intro-content">
      <div class="logo-badge">🎨</div>
      <h1 class="game-title">Jogo das<br><span class="title-accent">Cores</span></h1>
      <p class="game-subtitle">Teste sua percepção cromática e acumule XP</p>
      <div class="stats-preview">
        <div class="stat-chip"><span id="best-score-display">0</span> XP recorde</div>
      </div>
      <button id="btn-start" class="btn-primary" aria-label="Iniciar jogo">
        <span>Iniciar</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       TELA DE JOGO
  ════════════════════════════════════════════ -->
  <div id="screen-game" class="screen">
    <!-- Header -->
    <header class="game-header">
      <div class="header-left">
        <span class="round-badge">Rodada <span id="round-num">1</span>/10</span>
      </div>
      <div class="header-center">
        <div class="xp-bar-wrap" aria-label="XP acumulado">
          <div id="xp-bar" class="xp-bar"></div>
        </div>
        <span class="xp-label"><span id="score-display">0</span> XP</span>
      </div>
      <div class="header-right">
        <div id="timer-ring" class="timer-ring" role="timer" aria-live="polite">
          <svg viewBox="0 0 44 44" aria-hidden="true">
            <circle class="timer-bg" cx="22" cy="22" r="18"/>
            <circle id="timer-circle" class="timer-fg" cx="22" cy="22" r="18"/>
          </svg>
          <span id="timer-text">5</span>
        </div>
      </div>
    </header>

    <!-- Prompt de cor -->
    <section class="prompt-section" aria-label="Nome da cor a encontrar">
      <p class="prompt-label">Encontre a cor</p>
      <div class="prompt-word-wrap">
        <h2 id="color-name" class="prompt-word" aria-live="polite">—</h2>
        <div id="prompt-underline" class="prompt-underline"></div>
      </div>
    </section>

    <!-- Grade de cards -->
    <main id="color-grid" class="color-grid" role="grid" aria-label="Grade de cores para selecionar">
    </main>

    <!-- Feedback overlay -->
    <div id="feedback-overlay" class="feedback-overlay" aria-live="assertive" aria-atomic="true">
      <div id="feedback-icon" class="feedback-icon"></div>
      <p id="feedback-text" class="feedback-text"></p>
      <p id="feedback-xp" class="feedback-xp"></p>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       TELA DE RESULTADO
  ════════════════════════════════════════════ -->
  <div id="screen-result" class="screen">
    <div class="result-bg-orbs">
      <span class="orb orb-r1"></span>
      <span class="orb orb-r2"></span>
    </div>
    <div class="result-content">
      <div id="result-trophy" class="result-trophy">🏆</div>
      <h2 class="result-title">Rodada<br>Concluída!</h2>
      <div class="result-xp-card">
        <span class="result-xp-label">XP Total</span>
        <span id="final-score" class="result-xp-value">0</span>
      </div>
      <div class="result-stats">
        <div class="rs-item">
          <span id="result-correct" class="rs-num">0</span>
          <span class="rs-label">Acertos</span>
        </div>
        <div class="rs-divider"></div>
        <div class="rs-item">
          <span id="result-wrong" class="rs-num">0</span>
          <span class="rs-label">Erros</span>
        </div>
        <div class="rs-divider"></div>
        <div class="rs-item">
          <span id="result-streak" class="rs-num">0</span>
          <span class="rs-label">Sequência</span>
        </div>
      </div>
      <p id="result-record-msg" class="result-record-msg hidden">🎉 Novo Recorde!</p>
      <div class="result-actions">
        <button id="btn-replay" class="btn-primary" aria-label="Jogar novamente">Jogar Novamente</button>
        <button id="btn-home" class="btn-ghost" aria-label="Voltar ao início">Início</button>
      </div>
    </div>
  </div>

  <script src="../js/games.js"></script>
</body>
</html>
