<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Corrida do Foco</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body {
  width:100%; height:100%;
  background:#06060f;
  display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
  font-family: 'Segoe UI', system-ui, sans-serif;
  overflow:hidden;
}
#app {
  width:100%; max-width:440px; height:100vh;
  display:flex; flex-direction:column; align-items:center;
  position:relative; overflow:hidden;
  background: linear-gradient(180deg,#06060f 0%, #0c0c22 100%);
}
#hud {
  width:100%; display:flex; justify-content:space-between; align-items:center;
  padding:10px 18px 6px; z-index:10;
}
.hud-item { display:flex; flex-direction:column; align-items:center; gap:1px; }
.hud-label { font-size:9px; color:#44446a; letter-spacing:0.08em; text-transform:uppercase; font-weight:600; }
.hud-val { font-size:17px; font-weight:700; color:#c0c0ff; line-height:1; }
#xp-wrap { width:100%; padding:0 18px 5px; }
#xp-bg { background:#111130; border-radius:4px; height:4px; overflow:hidden; }
#xp-fill { height:4px; background:linear-gradient(90deg,#7c3aed,#06b6d4); border-radius:4px; width:0%; transition:width 0.5s ease; }
#canvas-area {
  width:100%; flex:1; position:relative; overflow:hidden;
  touch-action:none;
}
canvas { display:block; width:100%; height:100%; }
#overlay {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(6,6,15,0.92);
  z-index:20; gap:14px;
  backdrop-filter:blur(4px);
}
.ov-logo { font-size:42px; margin-bottom:4px; }
.ov-title { font-size:26px; font-weight:800; color:#a78bfa; letter-spacing:0.05em; text-align:center; }
.ov-sub { font-size:13px; color:#5555aa; text-align:center; max-width:260px; line-height:1.6; }
.ov-score { font-size:22px; color:#06d6a0; font-weight:700; }
.ov-hi { font-size:13px; color:#7c3aed; font-weight:600; }
.ov-msg { font-size:16px; color:#a78bfa; font-weight:600; text-align:center; }
.btn {
  padding:13px 36px; border-radius:50px; border:none; cursor:pointer;
  font-size:15px; font-weight:700; letter-spacing:0.07em;
  background:linear-gradient(135deg,#7c3aed,#06b6d4);
  color:#fff; transition:transform 0.12s, opacity 0.15s;
  box-shadow: 0 0 24px rgba(124,58,237,0.5);
}
.btn:active { transform:scale(0.94); opacity:0.85; }
.btn.outline {
  background:transparent;
  border:1.5px solid #7c3aed;
  color:#a78bfa;
  box-shadow: 0 0 10px rgba(124,58,237,0.25);
}
#pu-msg {
  position:absolute; top:14px; left:50%; transform:translateX(-50%);
  background:rgba(124,58,237,0.9); color:#e8d8ff;
  padding:6px 20px; border-radius:24px; font-size:13px; font-weight:700;
  pointer-events:none; opacity:0; transition:opacity 0.3s;
  z-index:15; white-space:nowrap;
  box-shadow: 0 0 16px rgba(124,58,237,0.6);
}
#sound-btn {
  position:absolute; top:10px; right:16px; z-index:30;
  background:rgba(20,20,50,0.8); border:1px solid #2a2a5a; border-radius:20px;
  color:#6666aa; font-size:12px; padding:4px 12px; cursor:pointer;
}
#ctrl-hint {
  font-size:10px; color:#2a2a4a; text-align:center;
  padding:4px 0 6px; letter-spacing:0.04em;
}
#active-powers {
  position:absolute; bottom:12px; right:14px;
  display:flex; flex-direction:column; gap:4px;
  z-index:12; pointer-events:none;
}
.pw-badge {
  font-size:11px; font-weight:700; padding:3px 10px; border-radius:12px;
  color:#fff; opacity:0.9;
}
</style>
</head>
<body>
<div id="app">
  <button id="sound-btn">🔊 Som</button>
  <div id="hud">
    <div class="hud-item"><span class="hud-label">Pontos</span><span class="hud-val" id="score-v">0</span></div>
    <div class="hud-item"><span class="hud-label">Nível</span><span class="hud-val" id="level-v">1</span></div>
    <div class="hud-item"><span class="hud-label">Recorde</span><span class="hud-val" id="hi-v">0</span></div>
    <div class="hud-item"><span class="hud-label">Vidas</span><span class="hud-val" id="lives-v">❤❤❤</span></div>
  </div>
  <div id="xp-wrap"><div id="xp-bg"><div id="xp-fill"></div></div></div>
  <div id="canvas-area">
    <canvas id="c"></canvas>
    <div id="pu-msg"></div>
    <div id="active-powers"></div>
    <div id="overlay">
      <div class="ov-logo">🏎️</div>
      <div class="ov-title">Corrida do Foco</div>
      <div class="ov-sub">Desvie dos obstáculos e colete<br>power-ups para sobreviver!</div>
      <button class="btn" id="startBtn">▶ Iniciar Corrida</button>
    </div>
  </div>
  <div id="ctrl-hint">← → Teclado &nbsp;|&nbsp; Toque nos lados ou arraste</div>
</div>

<script>
(function(){

/* ── Audio ── */
let soundOn = true;
document.getElementById('sound-btn').onclick = function(){
  soundOn = !soundOn;
  this.textContent = soundOn ? '🔊 Som' : '🔇 Mudo';
};
function playTone(type){
  if(!soundOn) return;
  try{
    const ac = new (window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    const t=ac.currentTime;
    if(type==='collect'){ o.type='sine'; o.frequency.value=880; g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.2); }
    else if(type==='hit'){ o.type='sawtooth'; o.frequency.value=180; g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.25); }
    else if(type==='die'){ o.type='square'; o.frequency.setValueAtTime(220,t); o.frequency.exponentialRampToValueAtTime(60,t+0.5); g.gain.setValueAtTime(0.18,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5); }
    else if(type==='levelup'){ o.type='sine'; o.frequency.setValueAtTime(440,t); o.frequency.setValueAtTime(880,t+0.12); g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3); }
    o.start(t); o.stop(t+0.6);
  }catch(e){}
}

/* ── Canvas setup ── */
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize(){
  const area = document.getElementById('canvas-area');
  W = area.clientWidth; H = area.clientHeight;
  canvas.width = W; canvas.height = H;
}

/* ── Game state ── */
let state='menu', raf=null;
let score, xp, level, lives, frame;
let hi = parseInt(localStorage.getItem('focusRaceHi')||'0');
let playerX, playerLane, playerTargetX;
let speed, baseSpeed;
let shield, slowTimer, turboTimer, multTimer;
let obstacles, powerups, particles, roadY;
let invincibleFrames=0;
let puTimeout=null;

document.getElementById('hi-v').textContent = hi;

/* ── Layout ── */
function getLanes(){ return [W*.27, W*.5, W*.73]; }
const ROAD_L = ()=>W*.16, ROAD_R = ()=>W*.84;

/* ── Init ── */
function init(){
  cancelAnimationFrame(raf);
  resize();
  state='playing';
  score=0; xp=0; level=1; lives=3; frame=0;
  playerLane=1; playerX=getLanes()[1]; playerTargetX=playerX;
  speed=baseSpeed=2.8;
  shield=false; slowTimer=0; turboTimer=0; multTimer=0; invincibleFrames=0;
  obstacles=[]; powerups=[]; particles=[];
  roadY=Array.from({length:10},(_,i)=>i*(H/10));
  document.getElementById('overlay').style.display='none';
  updateHUD(); loop();
}

/* ── HUD ── */
function updateHUD(){
  document.getElementById('score-v').textContent=score;
  document.getElementById('level-v').textContent=level;
  document.getElementById('hi-v').textContent=hi;
  document.getElementById('lives-v').textContent='❤'.repeat(lives)||'💀';
  document.getElementById('xp-fill').style.width=Math.min(100,(xp%(level*100))/(level*100)*100)+'%';
  const pw=document.getElementById('active-powers'); pw.innerHTML='';
  if(shield) pw.innerHTML+=`<div class="pw-badge" style="background:#0e7490">🛡 Escudo</div>`;
  if(slowTimer>0) pw.innerHTML+=`<div class="pw-badge" style="background:#5b21b6">⏱ Slow</div>`;
  if(turboTimer>0) pw.innerHTML+=`<div class="pw-badge" style="background:#b45309">⚡ Turbo</div>`;
  if(multTimer>0) pw.innerHTML+=`<div class="pw-badge" style="background:#065f46">💎 x2 XP</div>`;
}

/* ── Power-up message ── */
function showPU(msg,col){
  const el=document.getElementById('pu-msg');
  el.textContent=msg; el.style.background=col+'dd'; el.style.opacity='1';
  if(puTimeout) clearTimeout(puTimeout);
  puTimeout=setTimeout(()=>el.style.opacity='0',1900);
}

/* ── Drawing ── */
function drawBg(){
  ctx.fillStyle='#07071a'; ctx.fillRect(0,0,W,H);
  // Side areas
  ctx.fillStyle='#050511'; ctx.fillRect(0,0,ROAD_L(),H); ctx.fillRect(ROAD_R(),0,W-ROAD_R(),H);
}

function drawRoad(){
  const l=ROAD_L(),r=ROAD_R(),rw=r-l;
  // Road surface
  ctx.fillStyle='#0f0f28'; ctx.fillRect(l,0,rw,H);
  // Edges glow
  ctx.save();
  ctx.shadowColor='#7c3aed'; ctx.shadowBlur=14;
  ctx.strokeStyle='#7c3aed33'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(l,0); ctx.lineTo(l,H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(r,0); ctx.lineTo(r,H); ctx.stroke();
  ctx.restore();
  // Center dashes
  ctx.setLineDash([26,18]);
  ctx.strokeStyle='#1e1e42'; ctx.lineWidth=2;
  const laneW=rw/3;
  [1,2].forEach(i=>{
    const x=l+laneW*i;
    roadY.forEach(y=>{
      ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+26); ctx.stroke();
    });
  });
  ctx.setLineDash([]);
}

function drawCar(x,y,color,glowColor,w,h,isDead){
  ctx.save();
  if(invincibleFrames>0&&Math.floor(invincibleFrames/4)%2===0){ ctx.restore(); return; }
  ctx.shadowColor=glowColor; ctx.shadowBlur=shield?0:16;
  // Body
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(x,y-h/2);
  ctx.bezierCurveTo(x+w/2,y-h/2+h*0.18, x+w/2,y+h/2-h*0.22, x,y+h/2);
  ctx.bezierCurveTo(x-w/2,y+h/2-h*0.22, x-w/2,y-h/2+h*0.18, x,y-h/2);
  ctx.fill();
  // Windshield
  ctx.fillStyle='rgba(0,255,220,0.15)';
  ctx.fillRect(x-w*0.28,y-h*0.22,w*0.56,h*0.22);
  // Wheels
  ctx.fillStyle='#222240';
  ctx.fillRect(x-w/2-3,y-h*0.3,6,10); ctx.fillRect(x+w/2-3,y-h*0.3,6,10);
  ctx.fillRect(x-w/2-3,y+h*0.1,6,10); ctx.fillRect(x+w/2-3,y+h*0.1,6,10);
  // Turbo flame
  if(turboTimer>0){
    ctx.shadowColor='#fbbf24'; ctx.shadowBlur=20;
    ctx.fillStyle='#fbbf2488';
    ctx.beginPath(); ctx.ellipse(x,y+h/2+8,5,12+Math.random()*6,0,0,Math.PI*2); ctx.fill();
  }
  // Shield ring
  if(shield){
    ctx.shadowColor='#06b6d4'; ctx.shadowBlur=24;
    ctx.strokeStyle='#06b6d4'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(x,y,h/2+12,0,Math.PI*2); ctx.stroke();
  }
  ctx.restore();
}

function drawObstacle(o){
  ctx.save();
  ctx.shadowColor=o.color; ctx.shadowBlur=14;
  ctx.fillStyle=o.color;
  if(o.shape==='car'){
    drawCar(o.x,o.y,o.color,o.color,22,38,false);
  } else if(o.shape==='barrier'){
    ctx.fillStyle=o.color;
    ctx.fillRect(o.x-24,o.y-8,48,16);
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.fillRect(o.x-22,o.y-6,44,5);
    ctx.fillStyle='#111'; ctx.fillRect(o.x-8,o.y-7,16,14);
  } else {
    ctx.beginPath(); ctx.arc(o.x,o.y,15,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.beginPath(); ctx.arc(o.x-3,o.y-4,5,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawPowerup(p){
  const t=Date.now()/1000;
  ctx.save();
  ctx.shadowColor=p.col; ctx.shadowBlur=22;
  ctx.globalAlpha=0.88+Math.sin(t*3)*0.12;
  ctx.strokeStyle=p.col; ctx.lineWidth=2.5;
  ctx.fillStyle=p.col+'33';
  ctx.beginPath(); ctx.arc(p.x,p.y,17,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.globalAlpha=1;
  ctx.font='18px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#fff'; ctx.shadowBlur=0;
  ctx.fillText(p.glyph,p.x,p.y+1);
  ctx.restore();
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

/* ── Spawn ── */
const OBS_SHAPES=['car','barrier','cone'];
const OBS_COLORS=['#f72585','#ff6b35','#ffd60a'];
const PU_DEFS={
  shield:{col:'#06b6d4',glyph:'🛡'},
  slow:{col:'#a78bfa',glyph:'⏱'},
  turbo:{col:'#fbbf24',glyph:'⚡'},
  multi:{col:'#34d399',glyph:'💎'}
};
function spawnObs(){
  const li=Math.floor(Math.random()*3);
  const shape=OBS_SHAPES[Math.floor(Math.random()*3)];
  const color=OBS_COLORS[Math.floor(Math.random()*3)];
  const spd=speed*(0.8+Math.random()*0.4);
  obstacles.push({x:getLanes()[li],y:-40,lane:li,shape,color,spd});
}
function spawnPU(){
  const keys=Object.keys(PU_DEFS);
  const kind=keys[Math.floor(Math.random()*keys.length)];
  const li=Math.floor(Math.random()*3);
  const {col,glyph}=PU_DEFS[kind];
  powerups.push({x:getLanes()[li],y:-28,kind,col,glyph,spd:speed*0.65});
}

/* ── Explosion ── */
function explode(x,y,color,n=20){
  const cols=['#f72585','#7c3aed','#06d6a0','#fbbf24',color];
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=1.5+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:2+Math.random()*4,life:1,color:cols[Math.floor(Math.random()*cols.length)]});
  }
}

/* ── Collision ── */
function hit(ax,ay,bx,by,r=28){ return Math.hypot(ax-bx,ay-by)<r; }

/* ── Main loop ── */
function loop(){
  if(state!=='playing') return;
  frame++;
  const eff=slowTimer>0?speed*0.42:(turboTimer>0?speed*1.75:speed);

  // Road scroll
  roadY.forEach((y,i)=>{ roadY[i]+=eff*1.3; if(roadY[i]>H) roadY[i]-=H; });

  // Spawn rate
  const sr=Math.max(38,95-level*7);
  if(frame%sr===0) spawnObs();
  if(frame%(260-Math.min(level*10,150))===0) spawnPU();

  // Score & XP
  score+=(turboTimer>0?2:1);
  xp+=(multTimer>0?2:1);

  // Level up
  const xpNeed=level*100;
  if(xp>=xpNeed){ level++; baseSpeed+=0.22; xp=0; playTone('levelup'); showPU('Nível '+level+'! 🚀','#7c3aed'); }
  speed=baseSpeed;

  // Timers
  if(slowTimer>0) slowTimer--;
  if(turboTimer>0) turboTimer--;
  if(multTimer>0) multTimer--;
  if(invincibleFrames>0) invincibleFrames--;

  // Move entities
  const obsSpd=slowTimer>0?0.42:1;
  obstacles.forEach(o=>{ o.y+=o.spd*obsSpd; });
  obstacles=obstacles.filter(o=>o.y<H+50);
  powerups.forEach(p=>{ p.y+=p.spd; });
  powerups=powerups.filter(p=>p.y<H+40);
  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life-=0.04; });
  particles=particles.filter(p=>p.life>0);

  // Player smooth move
  playerX+=(playerTargetX-playerX)*0.2;

  const py=H-85;

  // Obstacle collision
  if(invincibleFrames===0){
    for(let i=obstacles.length-1;i>=0;i--){
      const o=obstacles[i];
      const r=o.shape==='barrier'?34:28;
      if(hit(playerX,py,o.x,o.y,r)){
        explode(o.x,o.y,o.color);
        obstacles.splice(i,1);
        if(shield){ shield=false; showPU('Escudo quebrou!','#06b6d4'); playTone('hit'); }
        else{
          lives--; playTone(lives>0?'hit':'die');
          invincibleFrames=90;
          updateHUD();
          if(lives<=0){ gameOver(); return; }
        }
        break;
      }
    }
  }

  // Power-up collision
  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i];
    if(hit(playerX,py,p.x,p.y,30)){
      explode(p.x,p.y,p.col,14);
      powerups.splice(i,1); playTone('collect');
      if(p.kind==='shield'){ shield=true; showPU('🛡 Escudo ativo!',PU_DEFS.shield.col); }
      else if(p.kind==='slow'){ slowTimer=230; showPU('⏱ Câmera lenta!',PU_DEFS.slow.col); }
      else if(p.kind==='turbo'){ turboTimer=190; showPU('⚡ Turbo!',PU_DEFS.turbo.col); }
      else if(p.kind==='multi'){ multTimer=210; showPU('💎 XP x2!',PU_DEFS.multi.col); }
    }
  }

  // Draw
  drawBg(); drawRoad();
  if(slowTimer>0){ ctx.fillStyle='rgba(167,139,250,0.04)'; ctx.fillRect(ROAD_L(),0,ROAD_R()-ROAD_L(),H); }
  if(turboTimer>0){ ctx.fillStyle='rgba(251,191,36,0.05)'; ctx.fillRect(ROAD_L(),0,ROAD_R()-ROAD_L(),H); }
  obstacles.forEach(o=>drawObstacle(o));
  powerups.forEach(p=>drawPowerup(p));
  drawParticles();
  drawCar(playerX,py,'#06d6a0','#00ffcc',26,44,false);

  // Hi score
  hi=Math.max(hi,score);
  localStorage.setItem('focusRaceHi',hi);
  updateHUD();
  raf=requestAnimationFrame(loop);
}

/* ── Game Over ── */
function gameOver(){
  state='over';
  cancelAnimationFrame(raf);
  hi=Math.max(hi,score);
  localStorage.setItem('focusRaceHi',hi);
  const msgs=[
    [200,'🔥 Incrível! Reflexos afiados!'],
    [100,'👏 Muito bom! Continue assim!'],
    [50,'⭐ Bom começo! Pratique mais!'],
    [0,'🎯 Continue tentando, você melhora!']
  ];
  const msg=msgs.find(([t])=>score>=t)[1];
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <div class="ov-logo">💥</div>
    <div class="ov-title">Game Over</div>
    <div class="ov-score">Pontos: ${score}</div>
    <div class="ov-hi">🏆 Recorde: ${hi}</div>
    <div class="ov-msg">${msg}</div>
    <button class="btn" id="retryBtn">🔄 Tentar Novamente</button>
    <button class="btn outline" id="menuBtn">🏠 Menu</button>
  `;
  ov.style.display='flex';
  document.getElementById('retryBtn').onclick=()=>init();
  document.getElementById('menuBtn').onclick=()=>showMenu();
}

function showMenu(){
  state='menu';
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <div class="ov-logo">🏎️</div>
    <div class="ov-title">Corrida do Foco</div>
    <div class="ov-sub">Desvie dos obstáculos e colete<br>power-ups para sobreviver!</div>
    <div class="ov-hi">🏆 Recorde: ${hi}</div>
    <button class="btn" id="startBtn">▶ Iniciar Corrida</button>
  `;
  ov.style.display='flex';
  document.getElementById('startBtn').onclick=()=>init();
}

document.getElementById('startBtn').onclick=()=>init();

/* ── Controls ── */
function moveLeft(){ if(playerLane>0){ playerLane--; playerTargetX=getLanes()[playerLane]; } }
function moveRight(){ if(playerLane<2){ playerLane++; playerTargetX=getLanes()[playerLane]; } }

document.addEventListener('keydown',e=>{
  if(state!=='playing') return;
  if(e.key==='ArrowLeft'||e.key==='a') moveLeft();
  if(e.key==='ArrowRight'||e.key==='d') moveRight();
});

let touchX=null;
const ca=document.getElementById('canvas-area');
ca.addEventListener('touchstart',e=>{ touchX=e.touches[0].clientX; },{passive:true});
ca.addEventListener('touchend',e=>{
  if(touchX===null||state!=='playing') return;
  const dx=e.changedTouches[0].clientX-touchX;
  if(Math.abs(dx)>22){ dx<0?moveLeft():moveRight(); }
  else {
    const bnd=ca.getBoundingClientRect();
    e.changedTouches[0].clientX-bnd.left<bnd.width/2?moveLeft():moveRight();
  }
  touchX=null;
},{passive:true});

ca.addEventListener('click',e=>{
  if(state!=='playing') return;
  const bnd=ca.getBoundingClientRect();
  e.clientX-bnd.left<bnd.width/2?moveLeft():moveRight();
});

window.addEventListener('resize',()=>{
  resize();
