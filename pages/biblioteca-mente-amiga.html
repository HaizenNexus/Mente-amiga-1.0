<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mente Amiga — Biblioteca</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
<link rel="shortcut icon" href="../assets/favicon.ico" type="image/x-icon">
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --neon-green:  #00ffaa;
  --neon-blue:   #00d4ff;
  --neon-purple: #b94fff;
  --neon-pink:   #ff2d78;
  --neon-yellow: #ffe400;

  --bg-dark:     #060714;
  --bg-card:     #0d1230;
  --bg-panel:    #0a0f24;
  --border-dim:  rgba(0,212,255,.18);

  --font-head:   'Orbitron', sans-serif;
  --font-body:   'Nunito', sans-serif;

  --glow-green:  0 0 8px #00ffaa, 0 0 24px #00ffaa66;
  --glow-blue:   0 0 8px #00d4ff, 0 0 24px #00d4ff66;
  --glow-purple: 0 0 8px #b94fff, 0 0 24px #b94fff66;
  --glow-pink:   0 0 8px #ff2d78, 0 0 24px #ff2d7866;
  --glow-yellow: 0 0 8px #ffe400, 0 0 24px #ffe40066;
}

html { font-size: 16px; scroll-behavior: smooth; }

body {
  background: var(--bg-dark);
  color: #e0e8ff;
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* animated star / grid background */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,212,255,.07) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 90% 100%, rgba(185,79,255,.06) 0%, transparent 70%),
    repeating-linear-gradient(0deg,  transparent, transparent 39px, rgba(0,212,255,.04) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,212,255,.04) 40px);
  pointer-events: none;
}

/* ============================================================
   SCROLLBAR
   ============================================================ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 4px; }

/* ============================================================
   APP WRAPPER
   ============================================================ */
#app {
  position: relative; z-index: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 0 16px 60px;
  min-height: 100vh;
}

/* ============================================================
   SCREENS — show / hide
   ============================================================ */
.screen { display: none; }
.screen.active { display: block; }

/* ============================================================
   HEADER / TOPBAR
   ============================================================ */
.topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 22px 0 16px;
}

.topbar-title {
  font-family: var(--font-head);
  font-size: clamp(1.1rem, 4vw, 1.6rem);
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--neon-blue);
  text-shadow: var(--glow-blue);
  flex: 1;
}

.topbar-title span { color: var(--neon-green); text-shadow: var(--glow-green); }

/* ============================================================
   BACK BUTTON
   ============================================================ */
.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-head);
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--neon-blue);
  background: transparent;
  border: 1.5px solid var(--neon-blue);
  border-radius: 50px;
  padding: 8px 18px;
  cursor: pointer;
  transition: all .25s ease;
  box-shadow: 0 0 8px rgba(0,212,255,.25);
  white-space: nowrap;
}
.btn-back:hover {
  background: var(--neon-blue);
  color: var(--bg-dark);
  box-shadow: var(--glow-blue);
  transform: translateX(-3px);
}
.btn-back svg { width: 14px; height: 14px; }

/* ============================================================
   HERO (library screen)
   ============================================================ */
.hero {
  text-align: center;
  padding: 36px 0 48px;
  animation: fadeUp .6s ease both;
}
.hero-badge {
  display: inline-block;
  font-family: var(--font-head);
  font-size: .65rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--neon-purple);
  border: 1px solid var(--neon-purple);
  border-radius: 50px;
  padding: 4px 16px;
  margin-bottom: 18px;
  box-shadow: var(--glow-purple);
  animation: pulse 3s infinite;
}
.hero h1 {
  font-family: var(--font-head);
  font-size: clamp(2rem, 6vw, 3.2rem);
  font-weight: 900;
  line-height: 1.1;
  text-transform: uppercase;
  background: linear-gradient(135deg, var(--neon-blue) 0%, var(--neon-green) 50%, var(--neon-purple) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 12px rgba(0,212,255,.4));
  margin-bottom: 12px;
}
.hero p {
  color: rgba(200,215,255,.6);
  font-size: 1rem;
  font-weight: 600;
}

/* ============================================================
   SUBJECT GRID
   ============================================================ */
.subject-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 20px;
  padding-bottom: 20px;
}

.subject-card {
  position: relative;
  background: var(--bg-card);
  border: 1.5px solid var(--card-color, var(--neon-blue));
  border-radius: 20px;
  padding: 32px 20px 28px;
  cursor: pointer;
  overflow: hidden;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .3s ease;
  animation: fadeUp .5s ease both;
  box-shadow: 0 0 0 rgba(0,0,0,0);
  text-align: center;
}

/* staggered entrance */
.subject-card:nth-child(1) { animation-delay: .05s; }
.subject-card:nth-child(2) { animation-delay: .10s; }
.subject-card:nth-child(3) { animation-delay: .15s; }
.subject-card:nth-child(4) { animation-delay: .20s; }
.subject-card:nth-child(5) { animation-delay: .25s; }
.subject-card:nth-child(6) { animation-delay: .30s; }

.subject-card::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at 50% 0%, var(--card-color, var(--neon-blue)) 0%, transparent 70%);
  opacity: .06;
  transition: opacity .3s;
}
.subject-card:hover { transform: translateY(-8px) scale(1.03); }
.subject-card:hover { box-shadow: 0 12px 40px -8px var(--card-color); }
.subject-card:hover::before { opacity: .14; }

.subject-card::after {
  content: '';
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 60%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--card-color, var(--neon-blue)), transparent);
  border-radius: 0 0 4px 4px;
}

.card-icon {
  font-size: 2.8rem;
  margin-bottom: 14px;
  display: block;
  filter: drop-shadow(0 0 8px var(--card-color, var(--neon-blue)));
  transition: transform .3s ease;
}
.subject-card:hover .card-icon { transform: scale(1.15) rotate(-4deg); }

.card-letter {
  font-family: var(--font-head);
  font-size: 2.4rem;
  font-weight: 900;
  color: var(--card-color, var(--neon-blue));
  text-shadow: 0 0 16px var(--card-color, var(--neon-blue));
  line-height: 1;
  margin-bottom: 8px;
  display: block;
}

.card-name {
  font-family: var(--font-head);
  font-size: .78rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,.8);
  margin-bottom: 16px;
}

.card-badge {
  display: inline-block;
  font-size: .65rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--card-color, var(--neon-blue));
  border: 1px solid var(--card-color, var(--neon-blue));
  border-radius: 50px;
  padding: 3px 12px;
  opacity: .8;
}

/* ============================================================
   SUBJECT SCREEN
   ============================================================ */
#screen-subject .topbar { padding-top: 22px; }

.subject-header {
  text-align: center;
  padding: 28px 0 36px;
  animation: fadeUp .5s ease both;
}
.subject-header .subject-icon { font-size: 3.4rem; display: block; margin-bottom: 10px; }
.subject-header h2 {
  font-family: var(--font-head);
  font-size: clamp(1.4rem, 5vw, 2.2rem);
  font-weight: 900;
  text-transform: uppercase;
  color: var(--active-color, var(--neon-blue));
  text-shadow: 0 0 16px var(--active-color, var(--neon-blue));
  margin-bottom: 8px;
}
.subject-header p { color: rgba(200,215,255,.5); font-size: .9rem; }

/* year tabs */
.year-tabs {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 8px;
  margin-bottom: 28px;
  scrollbar-width: none;
}
.year-tabs::-webkit-scrollbar { display: none; }

.year-tab {
  flex-shrink: 0;
  font-family: var(--font-head);
  font-size: .62rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 8px 16px;
  border-radius: 50px;
  border: 1.5px solid var(--active-color, var(--neon-blue));
  color: var(--active-color, var(--neon-blue));
  background: transparent;
  cursor: pointer;
  transition: all .2s ease;
  opacity: .5;
}
.year-tab.selected, .year-tab:hover {
  background: var(--active-color, var(--neon-blue));
  color: var(--bg-dark);
  opacity: 1;
  box-shadow: 0 0 12px var(--active-color, var(--neon-blue));
}

/* year content panel */
.year-panel {
  display: none;
  animation: fadeUp .4s ease both;
}
.year-panel.active { display: block; }

.content-section {
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  border-left: 3px solid var(--active-color, var(--neon-blue));
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
  transition: border-color .3s, box-shadow .3s;
}
.content-section:hover {
  border-left-color: var(--active-color, var(--neon-blue));
  box-shadow: -4px 0 20px -4px var(--active-color, var(--neon-blue));
}

.section-title {
  font-family: var(--font-head);
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--active-color, var(--neon-blue));
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title span { font-size: 1.1rem; }

.content-section p,
.content-section li {
  font-size: .93rem;
  line-height: 1.75;
  color: rgba(220,230,255,.82);
}
.content-section ul, .content-section ol { padding-left: 20px; }
.content-section li { margin-bottom: 6px; }

.highlight {
  color: var(--active-color, var(--neon-blue));
  font-weight: 700;
}

/* exercise / challenge boxes */
.exercise-box {
  background: rgba(0,0,0,.3);
  border: 1px dashed rgba(255,255,255,.12);
  border-radius: 12px;
  padding: 16px;
  margin: 10px 0;
}
.exercise-box + .exercise-box { margin-top: 8px; }
.exercise-num {
  font-family: var(--font-head);
  font-size: .65rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--neon-yellow);
  margin-bottom: 6px;
}

.gabarito-item {
  background: rgba(0,255,170,.05);
  border: 1px solid rgba(0,255,170,.15);
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 10px;
}
.gabarito-item .answer { color: var(--neon-green); font-weight: 700; }

.mission-box {
  background: linear-gradient(135deg, rgba(185,79,255,.1), rgba(0,212,255,.08));
  border: 1.5px solid rgba(185,79,255,.35);
  border-radius: 16px;
  padding: 22px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.mission-box::before {
  content: '🚀';
  position: absolute; top: -10px; right: 14px;
  font-size: 3.5rem; opacity: .08;
}
.mission-box h4 {
  font-family: var(--font-head);
  font-size: .9rem;
  color: var(--neon-purple);
  text-shadow: var(--glow-purple);
  margin-bottom: 10px;
}
.mission-box p { color: rgba(220,230,255,.75); font-size: .9rem; line-height: 1.7; }

/* ============================================================
   KEYFRAMES
   ============================================================ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 6px var(--neon-purple); }
  50%      { box-shadow: var(--glow-purple); }
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 520px) {
  .subject-grid { grid-template-columns: 1fr 1fr; gap: 14px; }
  .subject-card { padding: 24px 12px 20px; }
  .card-letter { font-size: 1.8rem; }
}
</style>
</head>
<body>
<div id="app">

  <!-- ====================== LIBRARY SCREEN ====================== -->
  <div id="screen-library" class="screen active">
    <div class="topbar">
      <span class="topbar-title">Mente <span>Amiga</span></span>
    </div>

    <div class="hero">
      <div class="hero-badge">⚡ Zona de Estudos</div>
      <h1>Biblioteca<br>Galáctica</h1>
      <p>Escolha uma matéria e decole no conhecimento! 🚀</p>
    </div>

    <div class="subject-grid" id="subjectGrid"></div>
  </div>

  <!-- ====================== SUBJECT SCREEN ====================== -->
  <div id="screen-subject" class="screen">
    <div class="topbar">
      <button class="btn-back" id="btnBack">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Voltar
      </button>
      <span class="topbar-title" id="subjectTopTitle"></span>
    </div>

    <div class="subject-header">
      <span class="subject-icon" id="subjectIcon"></span>
      <h2 id="subjectTitle"></h2>
      <p>Selecione o ano escolar para estudar 📚</p>
    </div>

    <div class="year-tabs" id="yearTabs"></div>
    <div id="yearContent"></div>
  </div>

</div>

<script>
/* ============================================================
   DATA — Subjects
   ============================================================ */
const SUBJECTS = [
  { id: 'mat', letter: 'M', name: 'Matemática', icon: '📐', color: '#00ffaa', glow: '0 0 8px #00ffaa, 0 0 28px #00ffaa55' },
  { id: 'por', letter: 'P', name: 'Português',  icon: '📝', color: '#00d4ff', glow: '0 0 8px #00d4ff, 0 0 28px #00d4ff55' },
  { id: 'ing', letter: 'I', name: 'Inglês',     icon: '🌍', color: '#b94fff', glow: '0 0 8px #b94fff, 0 0 28px #b94fff55' },
  { id: 'his', letter: 'H', name: 'História',   icon: '🏛️', color: '#ffe400', glow: '0 0 8px #ffe400, 0 0 28px #ffe40055' },
  { id: 'cie', letter: 'C', name: 'Ciências',   icon: '🔬', color: '#ff2d78', glow: '0 0 8px #ff2d78, 0 0 28px #ff2d7855' },
  { id: 'red', letter: 'R', name: 'Redação',    icon: '✍️', color: '#ff8c00', glow: '0 0 8px #ff8c00, 0 0 28px #ff8c0055' },
];

/* ============================================================
   CONTENT GENERATOR — per subject/year
   ============================================================ */
const CONTENT = {

  mat: {
    1: {
      explicacao: `A <span class="highlight">Matemática do 1º ano</span> é a sua primeira aventura com os números! Você vai aprender a contar, reconhecer os algarismos de <strong>0 a 10</strong>, comparar quantidades (mais, menos, igual) e dar os primeiros passos na adição. Tudo isso usando objetos, dedos e muita imaginação!`,
      resumo: `<ul><li>Números de <strong>0 a 10</strong></li><li>Contar objetos no dia a dia</li><li>Comparar: <strong>maior, menor, igual</strong></li><li>Adição simples: juntar grupos</li><li>Formas geométricas básicas: círculo, quadrado, triângulo</li></ul>`,
      exercicios: [
        { q: 'Quantas maçãs existem? 🍎🍎🍎🍎', hint: 'Conte uma por uma.' },
        { q: 'Qual é maior: 7 ou 4?', hint: 'Lembre da ordem dos números.' },
        { q: '3 + 2 = ?', hint: 'Junte 3 e 2 objetos.' },
        { q: 'Desenhe 5 estrelas ⭐', hint: 'Pode usar o dedo para contar.' },
      ],
      gabarito: [
        { q: '🍎🍎🍎🍎', a: '4 maçãs', exp: 'Contamos cada maçã: 1, 2, 3, 4.' },
        { q: '7 ou 4', a: '7 é maior', exp: 'Na ordem, 7 vem depois de 4.' },
        { q: '3 + 2', a: '5', exp: 'Juntamos os 3 com os 2: total de 5.' },
      ],
      missao: `🎯 <strong>Missão Contador Espacial:</strong> Olhe ao redor do seu quarto e conte quantos objetos de cada cor você encontra. Anote tudo! Depois some as cores e descubra qual tem mais.`,
    },
    2: {
      explicacao: `No <span class="highlight">2º ano</span>, os números crescem! Você vai trabalhar com dezenas, aprender a <strong>somar e subtrair até 100</strong> e começar a entender o que é dobro e metade. Também vai conhecer medidas simples, como centímetros e metros.`,
      resumo: `<ul><li>Números até <strong>100</strong></li><li>Dezenas e unidades</li><li>Adição e subtração até 100</li><li>Dobro e metade</li><li>Medidas: cm, m, kg</li></ul>`,
      exercicios: [
        { q: '25 + 13 = ?', hint: 'Some as unidades e depois as dezenas.' },
        { q: 'O dobro de 8 é?', hint: 'Dobro = número + número.' },
        { q: '50 − 20 = ?', hint: 'Pense nas dezenas.' },
        { q: 'Qual é a metade de 10?', hint: 'Divida em 2 partes iguais.' },
      ],
      gabarito: [
        { q: '25 + 13', a: '38', exp: '5+3=8 e 2+1=3, resultado: 38.' },
        { q: 'Dobro de 8', a: '16', exp: '8+8=16.' },
        { q: '50 − 20', a: '30', exp: '5 dezenas − 2 dezenas = 3 dezenas = 30.' },
        { q: 'Metade de 10', a: '5', exp: '10÷2=5.' },
      ],
      missao: `🎯 <strong>Missão Mercado Virtual:</strong> Imagine que você tem R$ 50,00. Escolha 3 itens (cada um custa entre R$ 5 e R$ 20). Some os preços e veja se tem troco!`,
    },
    3: {
      explicacao: `O <span class="highlight">3º ano</span> traz a multiplicação! Você vai aprender as <strong>tabuadas de 1 a 5</strong>, entender frações simples (metade, terço, quarto) e trabalhar com números até <strong>1.000</strong>.`,
      resumo: `<ul><li>Multiplicação: tabuadas de 1 a 5</li><li>Divisão exata simples</li><li>Frações: ½, ⅓, ¼</li><li>Números até 1.000</li><li>Perímetro de figuras</li></ul>`,
      exercicios: [
        { q: '4 × 3 = ?', hint: 'São 4 grupos de 3.' },
        { q: 'Qual é ¼ de 20?', hint: 'Divida 20 por 4.' },
        { q: '15 ÷ 3 = ?', hint: 'Quanto cabe 3 em 15?' },
        { q: 'Um retângulo tem lados 5cm e 3cm. Qual é o perímetro?', hint: 'Some todos os lados.' },
      ],
      gabarito: [
        { q: '4 × 3', a: '12', exp: '3+3+3+3 = 12.' },
        { q: '¼ de 20', a: '5', exp: '20÷4=5.' },
        { q: '15 ÷ 3', a: '5', exp: '5×3=15.' },
        { q: 'Perímetro 5cm + 3cm', a: '16 cm', exp: '5+3+5+3=16.' },
      ],
      missao: `🎯 <strong>Missão Tabuada Ninja:</strong> Crie uma tabela de multiplicação 5×5 e pinte cada resultado par de uma cor e cada ímpar de outra. Quais aparecem mais?`,
    },
    4: {
      explicacao: `No <span class="highlight">4º ano</span>, a multiplicação cresce para as <strong>tabuadas de 6 a 10</strong>. Você também vai aprender sobre frações equivalentes, divisão com resto e ângulos nas figuras geométricas.`,
      resumo: `<ul><li>Tabuadas de 6 a 10</li><li>Divisão com resto</li><li>Frações equivalentes</li><li>Ângulos: agudo, reto, obtuso</li><li>Área de retângulos</li></ul>`,
      exercicios: [
        { q: '7 × 8 = ?', hint: 'Tabuada do 7.' },
        { q: '29 ÷ 4 = ? (resto?)', hint: 'Quantas vezes 4 cabe em 29?' },
        { q: '½ é equivalente a quantos quartos?', hint: 'Multiplique cima e baixo por 2.' },
        { q: 'Área: base 6cm, altura 4cm.', hint: 'Área = base × altura.' },
      ],
      gabarito: [
        { q: '7 × 8', a: '56', exp: 'Tabuada do 7: 7,14,21,28,35,42,49,56.' },
        { q: '29 ÷ 4', a: '7 resto 1', exp: '4×7=28, sobra 1.' },
        { q: '½ = ?/4', a: '2/4', exp: '1×2=2 e 2×2=4 → 2/4.' },
        { q: 'Área 6×4', a: '24 cm²', exp: '6×4=24.' },
      ],
      missao: `🎯 <strong>Missão Arquiteto Digital:</strong> Desenhe a planta de um quarto com pelo menos 4 cômodos. Calcule a área de cada um e descubra qual é o maior!`,
    },
    5: {
      explicacao: `O <span class="highlight">5º ano</span> introduz os <strong>números decimais</strong> e o sistema métrico completo. Você vai aprender operações com decimais, porcentagem básica e trabalhar com dados em gráficos.`,
      resumo: `<ul><li>Decimais: 0,5 / 1,25 / 3,7</li><li>Frações e decimais (equivalências)</li><li>Porcentagem: 10%, 25%, 50%</li><li>Gráficos de barras e tabelas</li><li>Múltiplos e divisores</li></ul>`,

/* ============================================================
   YEAR LABELS
   ============================================================ */
const YEARS = Array.from({length:9}, (_,i)=>`${i+1}º Ano`);

/* ============================================================
   DOM REFS
   ============================================================ */
const screenLibrary  = document.getElementById('screen-library');
const screenSubject  = document.getElementById('screen-subject');
const subjectGrid    = document.getElementById('subjectGrid');
const btnBack        = document.getElementById('btnBack');
const subjectTopTitle= document.getElementById('subjectTopTitle');
const subjectIcon    = document.getElementById('subjectIcon');
const subjectTitle   = document.getElementById('subjectTitle');
const yearTabsEl     = document.getElementById('yearTabs');
const yearContentEl  = document.getElementById('yearContent');

/* ============================================================
   BUILD LIBRARY GRID
   ============================================================ */
SUBJECTS.forEach(s => {
  const card = document.createElement('div');
  card.className = 'subject-card';
  card.style.setProperty('--card-color', s.color);
  card.innerHTML = `
    <span class="card-icon">${s.icon}</span>
    <span class="card-letter">${s.letter}</span>
    <div class="card-name">${s.name}</div>
    <span class="card-badge">9 anos • 45 atividades</span>
  `;
  card.addEventListener('click', () => openSubject(s));
  subjectGrid.appendChild(card);
});

/* ============================================================
   NAVIGATION
   ============================================================ */
function openSubject(s) {
  // Set active color CSS var
  document.documentElement.style.setProperty('--active-color', s.color);

  subjectTopTitle.textContent = s.name;
  subjectIcon.textContent = s.icon;
  subjectTitle.textContent = s.name;

  buildYearTabs(s);

  screenLibrary.classList.remove('active');
  screenSubject.classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}

btnBack.addEventListener('click', () => {
  screenSubject.classList.remove('active');
  screenLibrary.classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
});

/* ============================================================
   BUILD YEAR TABS + CONTENT
   ============================================================ */
function buildYearTabs(s) {
  yearTabsEl.innerHTML = '';
  yearContentEl.innerHTML = '';

  YEARS.forEach((label, i) => {
    const yr = i + 1;

    // Tab button
    const tab = document.createElement('button');
    tab.className = 'year-tab' + (yr === 1 ? ' selected' : '');
    tab.textContent = label;
    tab.dataset.yr = yr;
    tab.style.setProperty('--active-color', s.color);
    tab.addEventListener('click', () => selectYear(yr));
    yearTabsEl.appendChild(tab);

    // Panel
    const data = CONTENT[s.id]?.[yr];
    const panel = document.createElement('div');
    panel.className = 'year-panel' + (yr === 1 ? ' active' : '');
    panel.id = `year-panel-${yr}`;
    panel.style.setProperty('--active-color', s.color);

    if (!data) {
      panel.innerHTML = `<div class="content-section"><p>Conteúdo em breve! 🚀</p></div>`;
    } else {
      panel.innerHTML = buildPanelHTML(data, s.color);
    }
    yearContentEl.appendChild(panel);
  });
}

function selectYear(yr) {
  document.querySelectorAll('.year-tab').forEach(t => {
    t.classList.toggle('selected', parseInt(t.dataset.yr) === yr);
  });
  document.querySelectorAll('.year-panel').forEach(p => {
    p.classList.toggle('active', p.id === `year-panel-${yr}`);
  });
  window.scrollTo({top: yearTabsEl.offsetTop - 80, behavior:'smooth'});
}

/* ============================================================
   BUILD PANEL HTML
   ============================================================ */
function buildPanelHTML(d, color) {
  let exercHTML = (d.exercicios || []).map((ex, i) => `
    <div class="exercise-box">
      <div class="exercise-num">Exercício ${i+1}</div>
      <p>${ex.q}</p>
      ${ex.hint ? `<p style="font-size:.8rem;opacity:.55;margin-top:6px;">💡 Dica: ${ex.hint}</p>` : ''}
    </div>
  `).join('');

  let gabHTML = (d.gabarito || []).map((g, i) => `
    <div class="gabarito-item">
      <div class="exercise-num">Questão ${i+1}: ${esc(g.q)}</div>
      <p class="answer">✅ ${esc(g.a)}</p>
      <p style="font-size:.82rem;opacity:.65;margin-top:4px;">📖 ${esc(g.exp)}</p>
    </div>
  `).join('');

  return `
    <div class="content-section">
      <div class="section-title"><span>📖</span> Explicação</div>
      <p>${d.explicacao}</p>
    </div>
    <div class="content-section">
      <div class="section-title"><span>🧠</span> Resumo</div>
      ${d.resumo}
    </div>
    <div class="content-section">
      <div class="section-title"><span>✏️</span> Exercícios</div>
      ${exercHTML}
    </div>
    <div class="content-section">
      <div class="section-title"><span>✅</span> Gabarito Explicado</div>
      ${gabHTML}
    </div>
    <div class="content-section">
      <div class="section-title"><span>🎮</span> Desafio — Missão</div>
      <div class="mission-box">
        <h4>⚡ Missão do Ano</h4>
        <p>${d.missao}</p>
      </div>
    </div>
  `;
}

function esc(str) {
  if (!str) return '';
  return str.replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
